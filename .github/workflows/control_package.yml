name: Build package Docker container

on:
  push:
    branches: main
permissions:
  contents: read
  packages: write
jobs:
  login:
    runs-on: ubuntu-latest
    steps:
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          push: true
          tag: ghrc.io/carlos456dddd/Spring_Exercise_2:latest